services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beyo_manager
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d beyo_manager"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      # postgres:18+ stores data in a major-version subdir; mount at /var/lib/postgresql
      # (not /var/lib/postgresql/data) or the container refuses to start.
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: python run.py
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/beyo_manager
      REDIS_URL: redis://redis:6379/0
      UVICORN_RELOAD: "0"
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
    profiles:
      - app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python worker.py
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/beyo_manager
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/worker_healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 12
    profiles:
      - app

volumes:
  postgres_data:
  redis_data:
