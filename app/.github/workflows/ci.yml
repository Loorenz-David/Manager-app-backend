name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: make lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: make format

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ENVIRONMENT: testing
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/app_test
      REDIS_URL: redis://127.0.0.1:6379/0
      REDIS_KEY_PREFIX: app_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: make test
      - name: Auth refresh smoke (sign-in -> refresh)
        run: |
          set -euo pipefail

          APP_ENV=testing python run.py >/tmp/ci_auth_refresh_api.log 2>&1 &
          API_PID=$!
          cleanup() {
            kill "$API_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          ATTEMPTS=0
          until curl -fsS "http://127.0.0.1:8000/health" >/dev/null; do
            ATTEMPTS=$((ATTEMPTS + 1))
            if [ "$ATTEMPTS" -ge 45 ]; then
              echo "API health check failed"
              tail -n 60 /tmp/ci_auth_refresh_api.log || true
              exit 1
            fi
            sleep 1
          done

          bash ../tests/bootstrap_tests/01_seed_identity.sh
          bash ../tests/bootstrap_tests/02_health_auth.sh

  docker-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose version
      - run: python scripts/validate_bootstrap.py

  migrations-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m alembic upgrade head
      - run: python scripts/wait_for_services.py
